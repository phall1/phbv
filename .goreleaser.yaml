# GoReleaser config — builds cross-platform binaries and publishes a GitHub
# Release on every pushed `v*` tag (see .github/workflows/release.yml).
# Validate locally with `just snapshot` (needs goreleaser installed).
version: 2

project_name: phbv

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: phbv
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.gitSHA={{ .ShortCommit }}

archives:
  # name_template must stay in sync with install.sh's URL construction.
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: checksums.txt

release:
  github:
    owner: phall1
    name: phbv

# Publishes a Casks/phbv.rb into github.com/phall1/homebrew-tap on each release
# (Homebrew casks are GoReleaser's path for pre-built binaries). Requires a
# HOMEBREW_TAP_TOKEN secret in the phbv repo with write access to the tap (see
# README). Without it, the release job fails at this step — set the secret
# before cutting the next tag.
homebrew_casks:
  - name: phbv
    binaries:
      - phbv
    repository:
      owner: phall1
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/phall1/phbv"
    description: "Terminal UI for beads (bd) issue tracking"
    # phbv isn't code-signed, so strip the quarantine xattr post-install or
    # Gatekeeper blocks the downloaded binary.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/phbv"]
          end
